<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Government Fertilizer Decision System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* LOGIN PAGE */
#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
z-index:1000;
}

.login-box{
width:380px;
background:#ffffff;
padding:40px;
border-radius:10px;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
text-align:center;
border:1px solid #e0e0e0;
}

.login-title{
font-size:32px;
font-weight:700;
color:#1e3c2c;
}

.login-subtitle{
color:#777;
margin-bottom:25px;
}

.form-group{
text-align:left;
margin-bottom:18px;
}

.form-group label{
font-size:14px;
font-weight:500;
display:block;
margin-bottom:5px;
color:#333;
}

.form-group input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
background:#ffffff;
}

.password-wrapper{
display:flex;
}

.toggle-password{
border:none;
background:#f5f5f5;
padding:0 12px;
margin-left:6px;
border-radius:6px;
cursor:pointer;
}

.login-btn{
width:100%;
padding:12px;
border:none;
background:#1e3c2c;
color:white;
font-weight:600;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

/* MAIN */
#mainApp{
display:none;
background:#ffffff;
}

.app-header{
background:#ffffff;
border-bottom:1px solid #e0e0e0;
padding:16px 40px;
}

.header-content{
max-width:1400px;
margin:0 auto;
display:flex;
justify-content:space-between;
align-items:center;
}

.main-container{
padding:30px;
}

.two-column-layout{
display:grid;
grid-template-columns:420px 1fr;
gap:25px;
}

.input-card{
background:#ffffff;
border:1px solid #e0e0e0;
border-radius:12px;
padding:25px;
}

.section-title{
margin:20px 0 12px;
font-size:12px;
font-weight:600;
color:#666;
text-transform:uppercase;
border-bottom:1px solid #e0e0e0;
padding-bottom:5px;
}

.input-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.input-field label{
font-size:12px;
color:#666;
display:block;
margin-bottom:4px;
}

.input-field input{
width:100%;
padding:8px;
border:1px solid #e0e0e0;
border-radius:6px;
}

.add-btn{
margin-top:10px;
padding:8px;
background:#f5f5f5;
border:1px solid #e0e0e0;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.analyze-btn{
width:100%;
margin-top:20px;
padding:14px;
background:#1e3c2c;
border:none;
border-radius:8px;
font-weight:600;
color:white;
cursor:pointer;
}

.results-card{
background:#ffffff;
border:1px solid #e0e0e0;
border-radius:12px;
padding:25px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
<div class="login-box">
<h1 class="login-title">Government Fertilizer Decision System</h1>
<p class="login-subtitle">Soil Fertility Detector</p>

<form id="loginForm">
<div class="form-group">
<label>Username</label>
<input type="text" id="username" required>
</div>

<div class="form-group">
<label>Password</label>
<div class="password-wrapper">
<input type="password" id="password" required>
<button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
</div>
</div>

<button class="login-btn">Login</button>
</form>
</div>
</div>

<!-- MAIN APP -->
<div id="mainApp">

<div class="app-header">
<div class="header-content">
<h2>SoilSense Malawi</h2>
<button onclick="logout()">Logout</button>
</div>
</div>

<div class="main-container">

<div class="two-column-layout">

<div class="input-card">

<h2>Soil Parameters</h2>

<!-- PRIMARY -->
<div class="section-title">PRIMARY NUTRIENTS</div>

<div class="input-grid" id="primaryInputs">

<div class="input-field">
<label>Nitrogen</label>
<input type="number">
</div>

<div class="input-field">
<label>Phosphorus</label>
<input type="number">
</div>

<div class="input-field">
<label>Potassium</label>
<input type="number">
</div>

</div>

<button class="add-btn" onclick="addInput('primaryInputs')">+ Add Nutrient</button>


<!-- MICRO -->
<div class="section-title">MICRONUTRIENTS</div>

<div class="input-grid" id="microInputs">

<div class="input-field">
<label>Zinc</label>
<input type="number">
</div>

<div class="input-field">
<label>Iron</label>
<input type="number">
</div>

</div>

<button class="add-btn" onclick="addInput('microInputs')">+ Add Nutrient</button>


<!-- PHYSICAL -->
<div class="section-title">PHYSICAL PROPERTIES</div>

<div class="input-grid" id="physicalInputs">

<div class="input-field">
<label>Sand</label>
<input type="number">
</div>

<div class="input-field">
<label>Silt</label>
<input type="number">
</div>

<div class="input-field">
<label>Clay</label>
<input type="number">
</div>

</div>

<button class="add-btn" onclick="addInput('physicalInputs')">+ Add Property</button>

<button class="analyze-btn">Analyze Soil</button>

</div>


<div class="results-card">
<p>Enter soil parameters to analyze</p>
</div>

</div>

</div>
</div>

<script>

/* LOGIN */

const ADMIN={username:"admin",password:"Admin@123"}

document.getElementById("loginForm").onsubmit=function(e){
e.preventDefault()

const u=document.getElementById("username").value
const p=document.getElementById("password").value

if(u===ADMIN.username && p===ADMIN.password){
document.getElementById("loginPage").style.display="none"
document.getElementById("mainApp").style.display="block"
}
}

function logout(){
document.getElementById("mainApp").style.display="none"
document.getElementById("loginPage").style.display="flex"
}

function togglePassword(){
const p=document.getElementById("password")
p.type=p.type==="password"?"text":"password"
}


/* ADD INPUT FEATURE */

function addInput(containerId){

const container=document.getElementById(containerId)

const div=document.createElement("div")
div.className="input-field"

div.innerHTML=`
<label>New Parameter</label>
<input type="number" placeholder="Value">
`

container.appendChild(div)

}

</script>

</body>
</html>
